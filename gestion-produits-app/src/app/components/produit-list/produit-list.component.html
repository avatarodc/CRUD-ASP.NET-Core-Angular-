<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Liste des Produits</h2>
    <a routerLink="/produits/new" class="btn btn-primary">+ Nouveau Produit</a>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show">
    {{ errorMessage }}
    <button type="button" class="btn-close" (click)="errorMessage = ''"></button>
  </div>

  <div *ngIf="successMessage" class="alert alert-success alert-dismissible fade show">
    {{ successMessage }}
    <button type="button" class="btn-close" (click)="successMessage = ''"></button>
  </div>

  <div class="card">
    <div class="card-body p-0">
      <table class="table table-striped table-hover mb-0">
        <thead class="table-dark">
          <tr>
            <th>#</th>
            <th>Nom</th>
            <th>Description</th>
            <th>Prix (FCFA)</th>
            <th>Quantité</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let produit of produits">
            <td>{{ produit.id }}</td>
            <td>{{ produit.nom }}</td>
            <td>{{ produit.description }}</td>
            <td>{{ produit.prix | number:'1.0-0' }}</td>
            <td>{{ produit.quantite }}</td>
            <td>
              <button class="btn btn-sm btn-warning me-2" (click)="editProduit(produit.id)">
                Modifier
              </button>
              <button class="btn btn-sm btn-danger" (click)="deleteProduit(produit.id)">
                Supprimer
              </button>
            </td>
          </tr>
          <tr *ngIf="produits.length === 0">
            <td colspan="6" class="text-center py-4 text-muted">
              Aucun produit trouvé
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
