<div class="page">

  <!-- Header -->
  <div class="page-header">
    <button class="back-btn" (click)="onCancel()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Retour
    </button>
    <div class="page-title-block">
      <p class="page-eyebrow">{{ isEditMode ? 'Modification' : 'Création' }}</p>
      <h1 class="page-title">{{ isEditMode ? 'Modifier le produit' : 'Nouveau produit' }}</h1>
    </div>
  </div>

  <!-- Form card -->
  <div class="form-card">

    <div *ngIf="errorMessage" class="alert alert-error">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/>
      </svg>
      {{ errorMessage }}
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="form-grid">

        <div class="field full">
          <label class="field-label">Nom du produit <span class="req">*</span></label>
          <input
            type="text"
            class="field-input"
            formControlName="nom"
            placeholder="Ex : Ordinateur portable Dell"
            [class.invalid]="form.get('nom')?.invalid && form.get('nom')?.touched">
          <p class="field-error" *ngIf="form.get('nom')?.invalid && form.get('nom')?.touched">
            Le nom est requis (max 100 caractères)
          </p>
        </div>

        <div class="field full">
          <label class="field-label">Description</label>
          <textarea
            class="field-input field-textarea"
            formControlName="description"
            placeholder="Décrivez le produit..."
            rows="3"></textarea>
        </div>

        <div class="field">
          <label class="field-label">Prix (FCFA) <span class="req">*</span></label>
          <div class="input-wrap">
            <span class="input-prefix">FCFA</span>
            <input
              type="number"
              class="field-input with-prefix"
              formControlName="prix"
              step="0.01"
              min="0"
              placeholder="0"
              [class.invalid]="form.get('prix')?.invalid && form.get('prix')?.touched">
          </div>
          <p class="field-error" *ngIf="form.get('prix')?.invalid && form.get('prix')?.touched">
            Le prix doit être supérieur à 0
          </p>
        </div>

        <div class="field">
          <label class="field-label">Quantité en stock <span class="req">*</span></label>
          <input
            type="number"
            class="field-input"
            formControlName="quantite"
            min="0"
            placeholder="0"
            [class.invalid]="form.get('quantite')?.invalid && form.get('quantite')?.touched">
          <p class="field-error" *ngIf="form.get('quantite')?.invalid && form.get('quantite')?.touched">
            La quantité ne peut pas être négative
          </p>
        </div>

      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="onCancel()">
          Annuler
        </button>
        <button type="submit" class="btn-submit" [disabled]="form.invalid || isLoading">
          <span class="spinner" *ngIf="isLoading"></span>
          <svg *ngIf="!isLoading" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
            <path *ngIf="!isEditMode" d="M12 5v14M5 12h14"/>
            <path *ngIf="isEditMode" d="M20 6L9 17l-5-5"/>
          </svg>
          {{ isLoading ? 'Enregistrement...' : (isEditMode ? 'Enregistrer' : 'Créer le produit') }}
        </button>
      </div>

    </form>
  </div>
</div>
