<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card">
        <div class="card-header bg-dark text-white">
          <h5 class="mb-0">{{ isEditMode ? 'Modifier le Produit' : 'Nouveau Produit' }}</h5>
        </div>
        <div class="card-body">

          <div *ngIf="errorMessage" class="alert alert-danger">
            {{ errorMessage }}
          </div>

          <form [formGroup]="form" (ngSubmit)="onSubmit()">

            <div class="mb-3">
              <label class="form-label fw-semibold">Nom <span class="text-danger">*</span></label>
              <input
                type="text"
                class="form-control"
                formControlName="nom"
                placeholder="Nom du produit"
                [class.is-invalid]="form.get('nom')?.invalid && form.get('nom')?.touched">
              <div class="invalid-feedback">
                Le nom est requis (maximum 100 caractères).
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Description</label>
              <textarea
                class="form-control"
                formControlName="description"
                rows="3"
                placeholder="Description du produit"></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Prix <span class="text-danger">*</span></label>
              <input
                type="number"
                class="form-control"
                formControlName="prix"
                step="0.01"
                min="0"
                placeholder="Prix en FCFA"
                [class.is-invalid]="form.get('prix')?.invalid && form.get('prix')?.touched">
              <div class="invalid-feedback">
                Le prix doit être supérieur à 0.
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">Quantité <span class="text-danger">*</span></label>
              <input
                type="number"
                class="form-control"
                formControlName="quantite"
                min="0"
                placeholder="Quantité en stock"
                [class.is-invalid]="form.get('quantite')?.invalid && form.get('quantite')?.touched">
              <div class="invalid-feedback">
                La quantité ne peut pas être négative.
              </div>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary" [disabled]="form.invalid || isLoading">
                <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-1"></span>
                {{ isLoading ? 'Enregistrement...' : (isEditMode ? 'Modifier' : 'Créer') }}
              </button>
              <button type="button" class="btn btn-secondary" (click)="onCancel()">
                Annuler
              </button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
