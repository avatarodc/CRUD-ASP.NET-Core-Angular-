@if (auth.isLoggedIn()) {
  <div class="shell">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
      <div class="sidebar-glow"></div>

      <div class="brand">
        <div class="brand-mark">GP</div>
        <div class="brand-info">
          <span class="brand-name">GestionProduits</span>
          <span class="brand-sub">v2.0</span>
        </div>
      </div>

      <div class="nav-group">
        <span class="nav-label">Menu</span>
        <a routerLink="/produits" routerLinkActive="active" class="nav-item">
          <span class="nav-icon">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/>
              <path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/>
            </svg>
          </span>
          Produits
        </a>
      </div>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar">
            {{ auth.currentUser()?.firstName?.charAt(0) }}{{ auth.currentUser()?.lastName?.charAt(0) }}
          </div>
          <div class="user-details">
            <span class="user-name">{{ auth.currentUser()?.firstName }} {{ auth.currentUser()?.lastName }}</span>
            <span class="user-role">{{ auth.currentUser()?.role }}</span>
          </div>
        </div>
        <button class="logout-btn" (click)="auth.logout()" title="Se déconnecter">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- ── Main ── -->
    <main class="main">
      <router-outlet></router-outlet>
    </main>

  </div>
} @else {
  <router-outlet></router-outlet>
}
